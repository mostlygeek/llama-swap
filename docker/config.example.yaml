# llama-swap config
# Docs: https://github.com/mostlygeek/llama-swap
#
# Models: /models  →  /mnt/storage/lm_storage/models/gguf (host)
# Backends: /backends → ./backends (host) — put compiled binaries here per fork
#
# Built-in binaries (from the unified-cuda image):
#   llama-server, ik-llama-server, sd-server, whisper-server
#
# Custom fork layout example:
#   ./backends/
#     llama-cpp-b5000/llama-server   ← stock llama.cpp build
#     llamafile/llamafile            ← another fork
#     custom-fork/llama-server       ← your own build

healthCheckTimeout: 60
healthCheckInterval: 5

models:

  # --- Built-in llama-server (ships with the image) ---
  my-model:
    cmd: >-
      llama-server
      --port ${PORT}
      --model /models/my-model.gguf
      -ngl 99
      -c 4096
    proxy: http://127.0.0.1:${PORT}
    ttl: 300

  # --- ik-llama-server (also ships with image, CUDA only) ---
  my-model-ik:
    cmd: >-
      ik-llama-server
      --port ${PORT}
      --model /models/my-model.gguf
      -ngl 99
      -c 4096
    proxy: http://127.0.0.1:${PORT}
    ttl: 300

  # --- Custom fork from ./backends bind-mount ---
  my-model-custom:
    cmd: >-
      /backends/my-fork/llama-server
      --port ${PORT}
      --model /models/my-model.gguf
      -ngl 99
      -c 4096
    proxy: http://127.0.0.1:${PORT}
    ttl: 300
