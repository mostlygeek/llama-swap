services:
  llama-swap:
    image: llama-swap:unified-cuda
    build:
      context: .
      dockerfile: docker/Dockerfile.simplified
      args:
        BACKEND: cuda
    runtime: nvidia
    ports:
      - "9292:8080"
    volumes:
      - /mnt/c/Users/sross/.lmstudio/models:/models
      - ./backends/:/backends/
      - ./config.yaml:/etc/llama-swap/config/config.yaml
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu
    restart: unless-stopped
